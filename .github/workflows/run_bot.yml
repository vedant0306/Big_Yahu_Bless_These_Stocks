name: Scheduled Trading Execution

on:
  # 1. Scheduled run using CRON (Runs Monday through Friday during US market hours)
  # Note: Times are in UTC. This workflow runs every 30 minutes during the listed market window.
  schedule:
    - cron: '35 15 * * 1-5'
    - cron: '0,30 15-20 * * 1-5'
    - cron: '0 21 * * 1-5'

  # 2. Allows manual trigger from the Actions UI
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11 environment (guarantees fast binary wheels)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Cache pip dependencies to speed up future workflow runs
      - name: Cache Pip Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      # Step 5: Execute the main trading engine
      - name: Run Main Trading Engine
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
        run: |
          python main.py