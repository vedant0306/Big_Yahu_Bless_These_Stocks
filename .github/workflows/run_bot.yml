name: Scheduled Trading Execution

on:
  # Runs at 14:30 UTC (9:30 AM EST - Market Open) Monday through Friday
  schedule:
    - cron: '30 14 * * 1-5'
  
  # Allows manual execution directly from the GitHub UI
  workflow_dispatch:

jobs:
  execute-trade:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Trading Bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          IS_PAPER: "true" # Set to "false" only when trading real funds
          SYMBOL: "AAPL"
        run: |
          python main.py